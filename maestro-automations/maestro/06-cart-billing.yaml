appId: com.ujwal.maestroautomation
---
- tapOn:
    id: home-tab-icon
- waitForAnimationToEnd

# Add Margherita (₹199) to cart
- tapOn:
    id: cuisine-item-pizza
- tapOn:
    id: restaurant-card-p1
- tapOn:
    id: add-to-cart-p1m1

# Navigate back to home, then tap Cart tab
- pressKey: Back
- pressKey: Back
- tapOn:
    id: cart-tab-icon
- assertVisible:
    id: order-summary

# Bill for qty=1: subtotal ₹199, delivery ₹40, total ₹239
- assertVisible: "₹199"
- assertVisible: "₹40"
- assertVisible:
    id: cart-total
- assertVisible: "₹239"

# Increase quantity to 2: total = (199×2) + 40 = ₹438
- tapOn:
    id: increase-p1m1
- assertVisible: "₹438"
